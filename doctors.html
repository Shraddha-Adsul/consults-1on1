<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Providers | One-on-One Doctor Consults</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="header-text">
                <h1>Our Providers</h1>
                <p>Vetted physicians selected for their philosophy of care.</p>
            </div>
            <div class="header-logo">
                <img src="phai-logo.png" alt="PreventiveHealth.AI Logo">
            </div>
        </div>
    </header>

    <main class="container">

        <div class="back-nav">
            <a href="index.html">&larr; Back to overview</a>
        </div>

        <section class="doctors-grid">
            <div class="doctor-card">
                <div class="card-photo">
                    <img src="dr-meetali.png" alt="Dr. Meetali Bidaye">
                </div>
                <div class="card-info">
                    <h3>Dr. Meetali Bidaye</h3>
                    <p class="specialty">Nephrologist</p>
                    <p class="experience">13 years experience</p>
                    <div class="card-actions">
                        <button class="consult-btn" onclick="bookConsult('Dr. Meetali Bidaye')">Book Consult</button>
                        <button class="profile-btn" onclick="viewProfile('meetali-bidaye')">View Profile</button>
                    </div>
                </div>
            </div>

            <div class="doctor-card">
                <div class="card-photo">
                    <img src="https://placehold.co/300x400/d8d8d8/aaaaaa?text=+" alt="Doctor placeholder">
                </div>
                <div class="card-info">
                    <h3>Lorem Ipsum</h3>
                    <p class="specialty">Speciality</p>
                    <p class="experience">Coming soon</p>
                    <div class="card-actions">
                        <button class="consult-btn" onclick="bookConsult('Lorem Ipsum')">Book Consult</button>
                        <button class="profile-btn" onclick="viewProfile('placeholder-2')">View Profile</button>
                    </div>
                </div>
            </div>

            <div class="doctor-card">
                <div class="card-photo">
                    <img src="https://placehold.co/300x400/d8d8d8/aaaaaa?text=+" alt="Doctor placeholder">
                </div>
                <div class="card-info">
                    <h3>Lorem Ipsum</h3>
                    <p class="specialty">Speciality</p>
                    <p class="experience">Coming soon</p>
                    <div class="card-actions">
                        <button class="consult-btn" onclick="bookConsult('Lorem Ipsum')">Book Consult</button>
                        <button class="profile-btn" onclick="viewProfile('placeholder-3')">View Profile</button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Profile Drawer -->
    <div id="drawerOverlay" class="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="profileDrawer" class="drawer">
        <button class="drawer-close" onclick="closeDrawer()">&times;</button>
        <div id="profileDetails"></div>
    </div>

    <footer>
        <div class="container">
            <p>&copy; 2026 PreventiveHealth.AI | All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
